<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML_EDITOR // CYBERPUNK</title>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <meta name="description" content="在线 HTML 可视编辑器，支持导出 PDF / JPG、生成分享链接">
    <meta property="og:title" content="HTML_EDITOR // CYBERPUNK">
    <meta property="og:description" content="在线 HTML 可视编辑器，支持导出 PDF / JPG、生成分享链接">
    <meta property="og:url" content="https://yoo-moka.github.io/html-editor/">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #0a0a0f;
            --card:        #12121a;
            --muted:       #1c1c2e;
            --muted-fg:    #6b7280;
            --fg:          #e0e0e0;
            --accent:      #00ff88;
            --accent-b:    rgba(0,255,136,0.10);
            --accent2:     #00ff88;
            --accent2-b:   rgba(0,255,136,0.10);
            --accent3:     #00d4ff;
            --accent3-b:   rgba(0,212,255,0.10);
            --border:      #2a2a3a;
            --destructive: #ff3366;
            --font-head:   'Orbitron', 'Share Tech Mono', monospace;
            --font-body:   'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            --glow:        0 0 4px rgba(0,255,136,0.5), 0 0 8px rgba(0,255,136,0.2);
            --glow-sm:     0 0 3px rgba(0,255,136,0.4);
            --glow-lg:     0 0 6px rgba(0,255,136,0.5), 0 0 14px rgba(0,255,136,0.25);
            --glow2:       0 0 4px rgba(0,255,136,0.5), 0 0 8px rgba(0,255,136,0.2);
            --glow3:       0 0 4px rgba(0,212,255,0.4), 0 0 8px rgba(0,212,255,0.2);
            --radius:      6px;
            --radius-sm:   4px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-body);
            overflow: hidden;
        }

        #app { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }

        /* ─── Toolbar ─── */
        #toolbar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 14px;
            height: 48px;
            background: var(--card);
            border-bottom: 1px solid var(--accent);
            box-shadow: 0 1px 0 var(--accent), 0 2px 12px rgba(0,255,136,0.15);
            user-select: none;
        }

        .toolbar-brand {
            display: flex; align-items: center; gap: 10px;
            margin-right: 12px;
        }
        .brand-label {
            font-family: var(--font-head);
            font-size: 12px; font-weight: 900;
            color: var(--accent);
            text-shadow: var(--glow);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .brand-cursor {
            display: inline-block;
            width: 8px; height: 14px;
            background: var(--accent);
            margin-left: 3px;
            vertical-align: -2px;
            box-shadow: var(--glow-sm);
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .brand-label:hover { animation: rgbShift 0.4s ease-in-out; }
        @keyframes rgbShift {
            0%, 100% { text-shadow: -1px 0 #00ff88, 1px 0 #00d4ff, var(--glow); }
            50% { text-shadow: 1px 0 #00ff88, -1px 0 #00d4ff, var(--glow); }
        }

        .toolbar-sep {
            width: 1px; height: 20px;
            background: var(--border);
            margin: 0 4px; flex-shrink: 0;
        }
        .toolbar-group { display: flex; align-items: center; gap: 2px; }

        .btn {
            display: flex; align-items: center; gap: 5px;
            padding: 0 11px; height: 30px;
            border: 1px solid var(--border);
            background: transparent;
            font-family: var(--font-body); font-size: 11px; font-weight: 500;
            color: var(--muted-fg);
            cursor: pointer;
            transition: all 150ms cubic-bezier(0.4,0,0.2,1);
            white-space: nowrap;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: var(--radius-sm);
        }
        .btn svg { width: 12px; height: 12px; flex-shrink: 0; }
        .btn:hover {
            color: var(--bg);
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: var(--glow);
        }
        .btn-accent {
            color: var(--accent); border-color: var(--accent);
            background: var(--accent-b); text-shadow: var(--glow-sm);
        }
        .btn-accent:hover { background: var(--accent); color: var(--bg); box-shadow: var(--glow-lg); }
        .btn-active {
            color: var(--accent2); border-color: var(--accent2);
            background: var(--accent2-b); box-shadow: var(--glow2);
        }
        .btn-active:hover { background: var(--accent2); color: var(--bg); }
        .btn-icon { width: 30px; padding: 0; justify-content: center; }

        #filename-input {
            background: var(--muted); border: 1px solid var(--border); outline: none;
            color: var(--muted-fg); font-family: var(--font-body);
            font-size: 11px; font-weight: 500; width: 160px;
            cursor: pointer; padding: 4px 10px; transition: all 150ms;
            letter-spacing: 0.04em; border-radius: var(--radius-sm);
        }
        #filename-input:hover { border-color: var(--accent); color: var(--fg); }
        #filename-input:focus { border-color: var(--accent); color: var(--accent); cursor: text; box-shadow: var(--glow-sm); }

        /* ─── Main canvas area ─── */
        #main { flex: 1; display: flex; min-height: 0; overflow: hidden; }

        #canvas-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .panel-header {
            display: flex; align-items: center; gap: 8px;
            padding: 0 14px; height: 34px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0; position: relative; z-index: 10;
        }
        .panel-header::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.4;
        }
        .panel-title {
            font-family: var(--font-head);
            font-size: 9px; font-weight: 700;
            letter-spacing: 0.15em; text-transform: uppercase;
            color: var(--muted-fg);
        }
        .panel-title::before { content: '> '; color: var(--accent); }
        .panel-pill {
            font-size: 9px; padding: 2px 7px;
            font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
            border-radius: var(--radius-sm);
        }
        .pill-live { border: 1px solid var(--accent); color: var(--accent); background: var(--accent-b); box-shadow: var(--glow-sm); }
        .pill-visual { border: 1px solid var(--accent2); color: var(--accent2); background: var(--accent2-b); box-shadow: var(--glow2); }
        .pill-live::before { content: '◉ '; animation: blink 1.2s step-end infinite; }
        .panel-actions { margin-left: auto; display: flex; gap: 4px; flex-shrink: 0; }

        /* ── Edit button states ── */
        .btn-outline {
            color: var(--accent); border-color: var(--accent);
            background: transparent; text-shadow: var(--glow-sm);
        }
        .btn-outline:hover { background: var(--accent); color: var(--bg); box-shadow: var(--glow); }

        /* ── Edit / save-changes slide animation ── */
        #btn-visual-edit {
            transition: transform 320ms cubic-bezier(0.34, 1.56, 0.64, 1),
                        color 150ms, background 150ms, border-color 150ms, box-shadow 150ms;
        }
        #ve-save-btn {
            max-width: 0; padding: 0; overflow: hidden; opacity: 0; border-width: 0;
            transition: max-width 360ms cubic-bezier(0.34, 1.56, 0.64, 1),
                        padding 320ms cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 240ms ease,
                        border-width 10ms 300ms,
                        color 150ms, background 150ms, box-shadow 150ms;
            white-space: nowrap;
        }
        #ve-save-btn.ve-visible {
            max-width: 140px; padding: 0 12px; opacity: 1; border-width: 1px;
            transition: max-width 360ms cubic-bezier(0.34, 1.56, 0.64, 1),
                        padding 320ms cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 240ms 80ms ease,
                        border-width 0ms,
                        color 150ms, background 150ms, box-shadow 150ms;
        }
        #btn-visual-edit.is-editing { transform: translateX(-4px); }

        /* ─── Preview iframe ─── */
        #preview-frame { flex: 1; border: none; background: #fff; display: block; }

        /* ─── Visual edit ─── */
        #visual-wrap {
            flex: 1; overflow: auto; background: var(--bg);
            display: none; position: relative;
        }
        #visual-canvas { min-height: 100%; background: #fff; outline: none; }
        #ve-save-btn.has-changes { animation: ve-pulse 2s ease-in-out infinite; }
        @keyframes ve-pulse { 0%,100% { box-shadow: var(--glow-sm); } 50% { box-shadow: var(--glow-lg); } }
        #visual-canvas.edit-active [data-ve-idx]:hover { outline: 1px solid var(--accent2); outline-offset: 1px; cursor: text; }
        #visual-canvas.edit-active [data-ve-idx]:focus { outline: 1px solid var(--accent); outline-offset: 1px; }

        /* ─── Toast ─── */
        #toast {
            position: fixed; bottom: 36px; left: 50%;
            transform: translateX(-50%) translateY(14px);
            background: var(--card); border: 1px solid var(--accent); color: var(--accent);
            padding: 8px 18px; font-family: var(--font-body);
            font-size: 11px; font-weight: 500;
            pointer-events: none; opacity: 0;
            transition: opacity 160ms, transform 160ms;
            z-index: 99999; white-space: nowrap;
            text-shadow: var(--glow-sm); letter-spacing: 0.08em;
            border-radius: var(--radius); box-shadow: var(--glow);
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ─── Modal ─── */
        .modal-backdrop {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 160ms;
        }
        .modal-backdrop.open { opacity: 1; pointer-events: all; }
        .modal-box {
            background: var(--card); border: 1px solid var(--accent);
            width: 380px;
            transform: translateY(10px);
            transition: transform 200ms cubic-bezier(0.34,1.4,0.64,1);
            box-shadow: var(--glow-lg), inset 0 0 30px rgba(0,255,136,0.03);
            border-radius: 8px; overflow: hidden;
        }
        .modal-backdrop.open .modal-box { transform: translateY(0); }
        .modal-titlebar {
            display: flex; align-items: center;
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            background: var(--muted);
            font-family: var(--font-head); font-size: 11px; font-weight: 700;
            color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase;
            text-shadow: var(--glow-sm); position: relative;
        }
        .modal-titlebar::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }
        .modal-titlebar-dots { display: flex; gap: 5px; margin-right: 10px; }
        .modal-titlebar-dots span { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .modal-titlebar-dots span:nth-child(1) { background: var(--destructive); }
        .modal-titlebar-dots span:nth-child(2) { background: #ffd700; }
        .modal-titlebar-dots span:nth-child(3) { background: var(--accent); }
        .modal-body { padding: 20px 18px; }
        .modal-sub {
            font-size: 10px; color: var(--muted-fg);
            margin-bottom: 16px; line-height: 1.6;
            letter-spacing: 0.05em; text-transform: uppercase;
        }
        .modal-sub::before { content: '$ '; color: var(--accent); }
        .fmt-options { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
        .fmt-option {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; border: 1px solid var(--border);
            cursor: pointer; transition: all 150ms; position: relative;
            border-radius: var(--radius-sm);
        }
        .fmt-option:hover { border-color: var(--accent); background: var(--accent-b); }
        .fmt-option.selected { border-color: var(--accent); background: var(--accent-b); box-shadow: var(--glow-sm); }
        .fmt-option.selected::before { content: '▶'; position: absolute; left: -2px; color: var(--accent); font-size: 10px; text-shadow: var(--glow-sm); }
        .fmt-badge {
            width: 38px; height: 28px; display: flex; align-items: center; justify-content: center;
            font-family: var(--font-head); font-size: 9px; font-weight: 800; letter-spacing: 0.08em;
            flex-shrink: 0; border: 1px solid currentColor; text-transform: uppercase;
            border-radius: var(--radius-sm);
        }
        .badge-html { color: #ff6a00; border-color: rgba(255,106,0,0.5); background: rgba(255,106,0,0.1); }
        .badge-pdf  { color: var(--accent); border-color: rgba(0,255,136,0.4); background: var(--accent-b); }
        .badge-jpg  { color: var(--accent3); border-color: rgba(0,212,255,0.4); background: var(--accent3-b); }
        .badge-link { color: var(--accent2); border-color: rgba(0,255,136,0.35); background: var(--accent2-b); }
        .fmt-info { flex: 1; }
        .fmt-name { font-family: var(--font-head); font-size: 10px; font-weight: 700; color: var(--fg); letter-spacing: 0.08em; text-transform: uppercase; }
        .fmt-desc { font-size: 10px; color: var(--muted-fg); margin-top: 2px; }
        .fmt-radio { width: 14px; height: 14px; border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 150ms; }
        .fmt-option.selected .fmt-radio { border-color: var(--accent); box-shadow: var(--glow-sm); }
        .fmt-radio-dot { width: 6px; height: 6px; background: var(--accent); transform: scale(0); transition: transform 140ms cubic-bezier(0.34,1.56,0.64,1); }
        .fmt-option.selected .fmt-radio-dot { transform: scale(1); }
        .modal-footer {
            display: flex; justify-content: flex-end; gap: 8px;
            padding: 14px 18px; border-top: 1px solid var(--border); background: var(--muted);
        }
        .modal-btn {
            height: 30px; padding: 0 16px; border: 1px solid var(--border); background: transparent;
            font-family: var(--font-body); font-size: 10px; font-weight: 600;
            cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--muted-fg); transition: all 150ms; border-radius: var(--radius-sm);
        }
        .modal-btn-cancel:hover { background: var(--muted); color: var(--fg); border-color: var(--fg); }
        .modal-btn-confirm { color: var(--accent); border-color: var(--accent); background: var(--accent-b); text-shadow: var(--glow-sm); }
        .modal-btn-confirm:hover { background: var(--accent); color: var(--bg); box-shadow: var(--glow); }
    </style>
</head>
<body>
<div id="app">
    <div id="toolbar">
        <div class="toolbar-brand">
            <span class="brand-label">HTML_EDITOR<span class="brand-cursor"></span></span>
        </div>

        <div class="toolbar-sep"></div>
        <input id="filename-input" type="text" value="untitled.html" spellcheck="false" title="点击重命名文件">
        <div class="toolbar-sep"></div>

        <div class="toolbar-group">
            <button class="btn" id="btn-open" title="打开文件 (Ctrl+O)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                打开
            </button>
            <button class="btn" id="btn-save" title="另存为 (Ctrl+S)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                </svg>
                另存为
            </button>
        </div>

        <div class="toolbar-sep"></div>

        <div class="toolbar-group">
            <button class="btn" id="btn-fullscreen-preview" title="在新窗口预览">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                    <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
                新窗口
            </button>
        </div>
    </div>

    <div id="main">
        <div id="canvas-panel">
            <div class="panel-header" id="canvas-header">
                <span class="panel-title" id="canvas-panel-title">预览</span>
                <span class="panel-pill pill-live" id="canvas-pill">LIVE</span>
                <div class="panel-actions">
                    <button class="btn btn-icon" id="btn-undo" title="撤销 (Ctrl+Z)" style="display:none">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
                        </svg>
                    </button>
                    <button class="btn btn-icon" id="btn-redo" title="重做 (Ctrl+Y)" style="display:none">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/>
                        </svg>
                    </button>
                    <button class="btn btn-icon" id="btn-refresh" title="刷新">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"/>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                        </svg>
                    </button>
                    <button class="btn" id="btn-visual-edit" title="可视编辑 (Ctrl+E)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        <span id="ve-btn-label">编辑</span>
                    </button>
                    <button class="btn btn-accent" id="ve-save-btn" title="保存更改 (Ctrl+S)">✦ 保存更改</button>
                </div>
            </div>
            <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-forms allow-same-origin"></iframe>
            <div id="visual-wrap">
                <div id="visual-canvas"></div>
            </div>
        </div>
    </div>
</div>

<input type="file" id="file-input" accept=".html,.htm,.css,.js,.txt,.svg" style="display:none">
<div id="toast"></div>

<!-- Save Modal -->
<div id="save-modal-backdrop" class="modal-backdrop">
    <div id="save-modal" class="modal-box">
        <div class="modal-titlebar">
            <div class="modal-titlebar-dots"><span></span><span></span><span></span></div>
            SAVE AS
        </div>
        <div class="modal-body">
            <div class="modal-sub">选择输出格式</div>
            <div class="fmt-options">
                <div class="fmt-option selected" data-fmt="html">
                    <div class="fmt-badge badge-html">HTML</div>
                    <div class="fmt-info">
                        <div class="fmt-name">HTML Source</div>
                        <div class="fmt-desc">保存完整 HTML 文件，可再次编辑</div>
                    </div>
                    <div class="fmt-radio"><div class="fmt-radio-dot"></div></div>
                </div>
                <div class="fmt-option" data-fmt="pdf">
                    <div class="fmt-badge badge-pdf">PDF</div>
                    <div class="fmt-info">
                        <div class="fmt-name">PDF Document</div>
                        <div class="fmt-desc">直接导出 PDF 文件，页面完整还原</div>
                    </div>
                    <div class="fmt-radio"><div class="fmt-radio-dot"></div></div>
                </div>
                <div class="fmt-option" data-fmt="jpg">
                    <div class="fmt-badge badge-jpg">JPG</div>
                    <div class="fmt-info">
                        <div class="fmt-name">JPG Image</div>
                        <div class="fmt-desc">直接导出 JPG 截图，页面完整还原</div>
                    </div>
                    <div class="fmt-radio"><div class="fmt-radio-dot"></div></div>
                </div>
                <div class="fmt-option" data-fmt="link">
                    <div class="fmt-badge badge-link">URL</div>
                    <div class="fmt-info">
                        <div class="fmt-name">Share Link</div>
                        <div class="fmt-desc">压缩 HTML 进 URL，零服务器分享</div>
                    </div>
                    <div class="fmt-radio"><div class="fmt-radio-dot"></div></div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="modal-btn modal-btn-cancel" id="modal-cancel">取消</button>
            <button class="modal-btn modal-btn-confirm" id="modal-confirm">确认导出</button>
        </div>
    </div>
</div>

<script>
(function () {
    const previewFrame   = document.getElementById('preview-frame');
    const toast          = document.getElementById('toast');
    const fileInput      = document.getElementById('file-input');
    const filenameInput  = document.getElementById('filename-input');
    const visualWrap     = document.getElementById('visual-wrap');
    const visualCanvas   = document.getElementById('visual-canvas');
    const canvasPill     = document.getElementById('canvas-pill');
    const canvasPanelTitle = document.getElementById('canvas-panel-title');
    const btnVisualEdit  = document.getElementById('btn-visual-edit');
    const veSaveBtn      = document.getElementById('ve-save-btn');
    const saveBackdrop   = document.getElementById('save-modal-backdrop');
    const modalConfirmBtn = document.getElementById('modal-confirm');

    let htmlContent   = '';

    htmlContent = defaultHTML;
    btnVisualEdit.style.display = 'none';
    updatePreview();

    /* ── Hash restore ── */
    (function restoreFromHash() {
        const hash = location.hash;
        if (!hash.startsWith('#v=')) return;
        const compressed = hash.slice(3);
        const waitForLZ = (tries) => {
            if (window.LZString) {
                const html = LZString.decompressFromEncodedURIComponent(compressed);
                if (html) { htmlContent = html; isWelcome = false; btnVisualEdit.style.display = ''; btnVisualEdit.classList.add('btn-outline'); updatePreview(); showToast('[OK] 已从链接加载页面内容'); }
            } else if (tries > 0) { setTimeout(() => waitForLZ(tries - 1), 200); }
        };
        waitForLZ(20);
    })();

    const veBtnLabel = document.getElementById('ve-btn-label');
    const btnUndo    = document.getElementById('btn-undo');
    const btnRedo    = document.getElementById('btn-redo');

    /* ── Undo / Redo (visual canvas contenteditable history) ── */
    btnUndo.addEventListener('click', () => {
        if (!isVisualMode) return;
        visualCanvas.focus();
        document.execCommand('undo');
        scheduleSourceSync();
    });
    btnRedo.addEventListener('click', () => {
        if (!isVisualMode) return;
        visualCanvas.focus();
        document.execCommand('redo');
        scheduleSourceSync();
    });

    /* ── Visual edit ── */
    function enterVisualMode() {
        if (isVisualMode || isWelcome) return;
        isVisualMode = true; veHasChanges = false;
        previewFrame.style.display = 'none'; visualWrap.style.display = 'block';
        canvasPill.className = 'panel-pill pill-visual'; canvasPill.textContent = 'VISUAL';
        canvasPanelTitle.textContent = '可视编辑';
        btnVisualEdit.classList.remove('btn-outline');
        btnVisualEdit.classList.add('btn-active', 'is-editing');
        veBtnLabel.textContent = '退出编辑';
        btnUndo.style.display = ''; btnRedo.style.display = '';
        requestAnimationFrame(() => veSaveBtn.classList.add('ve-visible'));
        veSaveBtn.classList.remove('has-changes');
        renderVisualCanvas();
        veSnapshot = htmlContent;
    }

    function exitVisualMode(force) {
        if (!isVisualMode) return;
        if (!force && veHasChanges) {
            showToast('这位BOSS，你还未保存修改哦！', 3000);
            return;
        }
        isVisualMode = false; veHasChanges = false; veSnapshot = null;
        if (mutationObs) { mutationObs.disconnect(); mutationObs = null; }
        previewFrame.style.display = 'block'; visualWrap.style.display = 'none';
        canvasPill.className = 'panel-pill pill-live'; canvasPill.textContent = 'LIVE';
        canvasPanelTitle.textContent = '预览';
        btnVisualEdit.classList.remove('btn-active', 'is-editing');
        btnVisualEdit.classList.add('btn-outline');
        veBtnLabel.textContent = '编辑';
        btnUndo.style.display = 'none'; btnRedo.style.display = 'none';
        veSaveBtn.classList.remove('ve-visible', 'has-changes');
        updatePreview();
    }

    veSaveBtn.addEventListener('click', () => {
        flushVisualSync();
        veSnapshot = htmlContent;
        veHasChanges = false;
        veSaveBtn.classList.remove('has-changes');
        showToast('[OK] 更改已保存');
        exitVisualMode(true);
    });

    function renderVisualCanvas() {
        if (mutationObs) { mutationObs.disconnect(); mutationObs = null; }
        const src = htmlContent;
        const styleMatches = [...src.matchAll(/<style[^>]*>([\s\S]*?)<\/style>/gi)];
        const cssText = styleMatches.map(m => m[1]).join('\n');
        const bodyMatch = src.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
        const bodyHTML = bodyMatch ? bodyMatch[1] : src;
        suppressMutate = true;
        visualCanvas.innerHTML = `<style>#visual-canvas{all:initial;display:block}#visual-canvas *{box-sizing:border-box}${cssText}</style>${bodyHTML}`;
        let idx = 0;
        const walker = document.createTreeWalker(visualCanvas, NodeFilter.SHOW_ELEMENT, null);
        let node;
        while ((node = walker.nextNode())) {
            if (node.tagName === 'STYLE' || node.tagName === 'SCRIPT') continue;
            const hasDirectText = [...node.childNodes].some(n => n.nodeType === Node.TEXT_NODE && n.textContent.trim());
            if (hasDirectText) { node.setAttribute('data-ve-idx', idx++); node.setAttribute('contenteditable','true'); node.setAttribute('spellcheck','false'); }
        }
        visualCanvas.classList.add('edit-active');
        setTimeout(() => { suppressMutate = false; }, 100);
        mutationObs = new MutationObserver((mutations) => {
            if (suppressMutate) return;
            for (const m of mutations) { if (m.type === 'characterData' || m.type === 'childList') { scheduleSourceSync(); break; } }
        });
        mutationObs.observe(visualCanvas, { subtree: true, characterData: true, childList: true });
    }

    function flushVisualSync() {
        if (!isVisualMode) return;
        clearTimeout(syncTimeout);
        doSourceSync();
    }

    function scheduleSourceSync() {
        clearTimeout(syncTimeout);
        syncTimeout = setTimeout(() => {
            doSourceSync();
            if (veSnapshot !== null && htmlContent !== veSnapshot) {
                veHasChanges = true;
                veSaveBtn.classList.add('has-changes');
            }
        }, 400);
    }

    function doSourceSync() {
        const originalSrc = htmlContent;
        const clone = visualCanvas.cloneNode(true);
        clone.querySelectorAll('[data-ve-idx]').forEach(el => {
            el.removeAttribute('data-ve-idx');
            el.removeAttribute('contenteditable');
            el.removeAttribute('spellcheck');
        });
        const firstStyle = clone.querySelector('style');
        if (firstStyle && firstStyle.textContent.includes('#visual-canvas')) firstStyle.remove();
        const newBody = clone.innerHTML;
        const bodyMatch = originalSrc.match(/(<body[^>]*>)([\s\S]*?)(<\/body>)/i);
        let newSrc;
        if (bodyMatch) {
            newSrc = originalSrc.slice(0, bodyMatch.index) + bodyMatch[1] + newBody + bodyMatch[3] + originalSrc.slice(bodyMatch.index + bodyMatch[0].length);
        } else {
            newSrc = newBody;
        }
        if (newSrc !== originalSrc) { htmlContent = newSrc; }
    }

    btnVisualEdit.addEventListener('click', () => { if (isVisualMode) exitVisualMode(); else enterVisualMode(); });

    document.getElementById('btn-refresh').addEventListener('click', () => {
        if (isVisualMode) {
            warnUnsaved();
            renderVisualCanvas();
            veSnapshot = htmlContent;
            veHasChanges = false;
            veSaveBtn.classList.remove('has-changes');
            showToast('[OK] 可视编辑已刷新');
        } else { updatePreview(); showToast('[OK] 预览已刷新'); }
    });

    /* ── Short link ── */
    async function shortenAndCopy(longUrl) {
        showToast('正在生成短链，请稍候…', 30000);
        try {
            const res = await fetch('https://tinyurl.com/api-create.php?url=' + encodeURIComponent(longUrl));
            if (!res.ok) throw new Error('API ' + res.status);
            const text = (await res.text()).trim();
            if (!text.startsWith('http')) throw new Error('返回格式异常');
            if (navigator.clipboard && navigator.clipboard.writeText) {
                await navigator.clipboard.writeText(text).catch(() => fallbackCopyRaw(text));
            } else { fallbackCopyRaw(text); }
            showToast('[OK] 短链已生成并复制：' + text, 4000);
        } catch (err) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                await navigator.clipboard.writeText(longUrl).catch(() => fallbackCopyRaw(longUrl));
            } else { fallbackCopyRaw(longUrl); }
            showToast('[!] 短链生成失败，已复制原始链接', 3000);
        }
    }
    function fallbackCopyRaw(text) {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;';
        document.body.appendChild(ta); ta.focus(); ta.select();
        try { document.execCommand('copy'); } catch (_) {}
        document.body.removeChild(ta);
    }

    /* ── Save modal confirm ── */
    document.getElementById('modal-confirm').addEventListener('click', async () => {
        if (selectedFmt === 'link') {
            if (!window.LZString) { showToast('[ERR] 压缩库未加载，请刷新后重试'); return; }
            flushVisualSync();
            const compressed = LZString.compressToEncodedURIComponent(htmlContent);
            const url = location.href.split('#')[0].split('?')[0] + '#v=' + compressed;
            saveBackdrop.classList.remove('open');
            selectedFmt = 'html'; updateConfirmBtn('html');
            document.querySelectorAll('.fmt-option').forEach(o => o.classList.remove('selected'));
            document.querySelector('.fmt-option[data-fmt="html"]').classList.add('selected');
            await shortenAndCopy(url); return;
        }
        const currentFmt = selectedFmt;
        saveBackdrop.classList.remove('open');
        selectedFmt = 'html'; updateConfirmBtn('html');
        document.querySelectorAll('.fmt-option').forEach(o => o.classList.remove('selected'));
        document.querySelector('.fmt-option[data-fmt="html"]').classList.add('selected');
        flushVisualSync();
        if (currentFmt === 'html') { exportHTML(); }
        else if (currentFmt === 'pdf') {
            let fh = null;
            if (window.showSaveFilePicker) {
                try { const b = (filenameInput.value.trim()||'untitled').replace(/\.(html?|pdf|jpe?g)$/i,''); fh = await window.showSaveFilePicker({ suggestedName: b+'.pdf', types:[{description:'PDF',accept:{'application/pdf':['.pdf']}}] }); } catch(e){ if(e.name==='AbortError') return; }
            }
            exportPDF(fh);
        } else if (currentFmt === 'jpg') {
            let fh = null;
            if (window.showSaveFilePicker) {
                try { const b = (filenameInput.value.trim()||'untitled').replace(/\.(html?|pdf|jpe?g)$/i,''); fh = await window.showSaveFilePicker({ suggestedName: b+'.jpg', types:[{description:'JPG',accept:{'image/jpeg':['.jpg','.jpeg']}}] }); } catch(e){ if(e.name==='AbortError') return; }
            }
            exportJPG(fh);
        }
    });

    /* ── Export HTML ── */
    function exportHTML() {
        const base = (filenameInput.value.trim()||'untitled').replace(/\.(html?|pdf|jpe?g)$/i,'');
        const blob = new Blob([htmlContent], {type:'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = base + '.html';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);
        showToast('[OK] HTML 文件已保存');
    }

    /* ── Export PDF / JPG ── */
    function loadScript(src) {
        return new Promise((res,rej) => {
            if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
            const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s);
        });
    }
    const JSPDF_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    const DOM2IMG_CDN = 'https://cdn.jsdelivr.net/npm/dom-to-image-more@3.4.0/dist/dom-to-image-more.min.js';

    function capturePageAsDataURL(htmlSrc) {
        return new Promise((resolve, reject) => {
            const msgId = 'cap_' + Date.now();

            const iframe = document.createElement('iframe');
            iframe.style.cssText = 'position:fixed;left:-9999px;top:0;border:none;width:1280px;height:2000px;opacity:0;pointer-events:none;';
            document.body.appendChild(iframe);

            let timer = null;

            const cleanup = () => {
                clearTimeout(timer);
                window.removeEventListener('message', onMsg);
                if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
            };

            const onMsg = (evt) => {
                if (!evt.data || evt.data.id !== msgId) return;
                cleanup();
                if (evt.data.error) { reject(new Error(evt.data.error)); return; }
                resolve({ dataURL: evt.data.dataURL, W: evt.data.W, H: evt.data.H });
            };

            window.addEventListener('message', onMsg);

            timer = setTimeout(() => {
                cleanup();
                reject(new Error('截图超时，请检查网络后重试'));
            }, 60000);

            const captureScript = `<script>(function(){
function doCapture(){
  try{
    var body=document.body||document.documentElement;
    var W=Math.max(1280,body.scrollWidth,document.documentElement.scrollWidth);
    var H=Math.max(100,body.scrollHeight,document.documentElement.scrollHeight);
    body.style.minWidth=W+'px';
    body.style.minHeight=H+'px';
    body.style.overflow='visible';
    var node=body;
    domtoimage.toJpeg(node,{quality:0.95,width:W,height:H,style:{margin:'0',padding:'0',background:'#ffffff'}})
    .then(function(dataURL){
      parent.postMessage({id:'${msgId}',dataURL:dataURL,W:W,H:H},'*');
    }).catch(function(e){
      domtoimage.toPng(node,{width:W,height:H,style:{margin:'0',padding:'0',background:'#ffffff'}})
      .then(function(dataURL){parent.postMessage({id:'${msgId}',dataURL:dataURL,W:W,H:H},'*');})
      .catch(function(e2){parent.postMessage({id:'${msgId}',error:e.message+'\\n'+e2.message},'*');});
    });
  }catch(e){parent.postMessage({id:'${msgId}',error:e.message},'*');}
}
var s=document.createElement('script');
s.src='${DOM2IMG_CDN}';
s.onload=function(){ setTimeout(doCapture, 800); };
s.onerror=function(){parent.postMessage({id:'${msgId}',error:'dom-to-image 加载失败，请检查网络'},'*');};
document.head.appendChild(s);
})();<\/script>`;

            const hasBody = /<\/body>/i.test(htmlSrc);
            const injected = hasBody
                ? htmlSrc.replace(/<\/body>/i, captureScript + '</body>')
                : htmlSrc + captureScript;

            iframe.srcdoc = injected;
        });
    }

    async function exportPDF(fh) {
        showToast('正在生成 PDF，请稍候…', 60000);
        try { await loadScript(JSPDF_CDN); } catch(e) { showToast('[ERR] jsPDF 加载失败'); return; }
        try {
            const {dataURL,W,H} = await capturePageAsDataURL(htmlContent);
            const {jsPDF} = window.jspdf;
            const pxToMm = px => Math.round(px*2540/9600)/10;
            const pdfW=pxToMm(W), pdfH=pxToMm(H);
            const pdf = new jsPDF({orientation:pdfW>pdfH?'l':'p',unit:'mm',format:[pdfW,pdfH],compress:true});
            pdf.addImage(dataURL,'JPEG',0,0,pdfW,pdfH,'','FAST');
            const pdfBlob=pdf.output('blob');
            if (fh) { const w=await fh.createWritable(); await w.write(pdfBlob); await w.close(); showToast('[OK] PDF 已保存'); }
            else { const b=(filenameInput.value.trim()||'untitled').replace(/\.(html?|pdf|jpe?g)$/i,''); pdf.save(b+'.pdf'); showToast('[OK] PDF 已保存'); }
        } catch(e) { showToast('[ERR] PDF 生成失败：'+e.message); }
    }

    async function exportJPG(fh) {
        showToast('正在生成截图，请稍候…', 60000);
        try {
            const {dataURL} = await capturePageAsDataURL(htmlContent);
            const resp=await fetch(dataURL); const jpgBlob=await resp.blob();
            const b=(filenameInput.value.trim()||'untitled').replace(/\.(html?|pdf|jpe?g)$/i,'');
            if (fh) { try { const w=await fh.createWritable(); await w.write(jpgBlob); await w.close(); showToast('[OK] JPG 已保存'); } catch(_){ fallbackDownload(jpgBlob,b+'.jpg'); } }
            else { fallbackDownload(jpgBlob,b+'.jpg'); }
        } catch(e) { showToast('[ERR] 截图失败：'+e.message); }
    }

    function fallbackDownload(blob, filename) {
        const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
        setTimeout(()=>URL.revokeObjectURL(a.href),2000); showToast('[OK] 已保存');
    }

    function warnUnsaved() {
        if (!isVisualMode) return;
        if (veHasChanges) {
            flushVisualSync();
            veSnapshot = htmlContent;
            veHasChanges = false;
            veSaveBtn.classList.remove('has-changes');
            showToast('修改已自动保存，正在打开新文件 ✦', 2500);
        } else {
            showToast('已退出编辑模式，正在打开新文件', 2000);
        }
    }

    /* ── File open ── */
    document.getElementById('btn-open').addEventListener('click', () => { warnUnsaved(); fileInput.click(); });
    window.addEventListener('message', (e) => { if (e.data === 'open-file') { warnUnsaved(); fileInput.click(); } });
    fileInput.addEventListener('change', function() {
        const file=this.files[0]; if(!file) return;
        filenameInput.value=file.name;
        const reader=new FileReader();
        reader.onload=(ev) => {
            if(isVisualMode) exitVisualMode(true);
            htmlContent = ev.target.result;
            isWelcome = false;
            btnVisualEdit.style.display = '';
            btnVisualEdit.classList.add('btn-outline');
            updatePreview();
            showToast('[OK] 文件已加载');
        };
        reader.readAsText(file); this.value='';
    });

    /* ── Toolbar buttons ── */
    document.getElementById('btn-save').addEventListener('click', () => { if(isWelcome) return; flushVisualSync(); saveBackdrop.classList.add('open'); });
    document.getElementById('btn-fullscreen-preview').addEventListener('click', () => {
        if(isWelcome) return;
        if(isVisualMode) flushVisualSync();
        const blob=new Blob([htmlContent],{type:'text/html'}); const url=URL.createObjectURL(blob);
        window.open(url,'_blank'); setTimeout(()=>URL.revokeObjectURL(url),3000);
    });

    /* ── Keyboard shortcuts ── */
    document.addEventListener('keydown',(e)=>{
        if((e.ctrlKey||e.metaKey)&&e.key==='o'){e.preventDefault(); warnUnsaved(); fileInput.click();}
        if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault(); if(isWelcome) return; if(isVisualMode){veSaveBtn.click();}else{saveBackdrop.classList.add('open');}}
        if((e.ctrlKey||e.metaKey)&&e.key==='e'){e.preventDefault(); if(!isWelcome) btnVisualEdit.click();}
        if((e.ctrlKey||e.metaKey)&&e.key==='z'&&isVisualMode){e.preventDefault();btnUndo.click();}
        if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))&&isVisualMode){e.preventDefault();btnRedo.click();}
        if(e.key==='Escape'&&isVisualMode)exitVisualMode();
    });

})();
</script>
</body>
</html>
